name: Update scraping

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update scraping
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: |
        python3 -m pip install -r ./requirements.txt
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Do the scraping
      run: |
        (( $RANDOM < 32768 / 30 )) && python3 ./updater.py --no-cache --delay 1.5 core | cat
        (( $RANDOM < 32768 / 30 )) && python3 ./updater.py --no-cache ggs | cat
        python3 ./updater.py --no-cache --delay 1.5 cfps | cat

    - name: Push to GitHub
      run: |
        git add core.csv cfp.json parsing_errors.txt
        git diff --cached --quiet || git commit -m "Update scraping $(date --rfc-3339=date)"
        git push
